<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <i class="bi bi-bus-front-fill"></i>
      <h1>RutaSmart</h1>
      <span>Enterprise</span>
    </div>

    <div class="role-selector">
      <h2>Selecciona tu rol</h2>
      <div class="role-buttons">
        <button class="role-btn" [class.active]="rol === 'administrador'" (click)="seleccionarRol('administrador')">
          <i class="bi bi-person-gear"></i>
          <span>Administrador</span>
        </button>
        <button class="role-btn" [class.active]="rol === 'chofer'" (click)="seleccionarRol('chofer')">
          <i class="bi bi-person-badge"></i>
          <span>Chofer</span>
        </button>
        <button class="role-btn" [class.active]="rol === 'alumno'" (click)="seleccionarRol('alumno')">
          <i class="bi bi-mortarboard-fill"></i>
          <span>Alumno</span>
        </button>
      </div>
    </div>

    <form (ngSubmit)="ingresar()" class="login-form">
      <div class="input-group">
        <i class="bi bi-person-fill"></i>
        <input type="text" [(ngModel)]="usuario" name="usuario" placeholder="Usuario (correo)" required>
      </div>
      <div class="input-group">
        <i class="bi bi-lock-fill"></i>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Contraseña" required>
      </div>
      <button type="submit" class="login-btn">
        Ingresar al Sistema
        <i class="bi bi-arrow-right"></i>
      </button>
      <small style="display:block;text-align:center;margin-top:12px;color:#64748b;">
        admin123 · chofer123 · alumno123
      </small>
    </form>

    <div class="login-footer">
      <p>© 2026 RutaSmart Enterprise</p>
    </div>
  </div>
</div>
