spring.application.name=RutaSmart API

# Puerto dinámico para que Railway mantenga el servidor encendido
server.port=${PORT:8080}

# Configuración de Base de Datos (Supabase)
spring.datasource.url=jdbc:postgresql://db.pzfgkzdzseqielzmyrdh.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=Amorcito2570?
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Forzar dialecto y desactivar escaneo de metadatos preventivo
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Configuración Horaria y Swagger
spring.jackson.time-zone=America/Lima
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger

# Logs y Seguridad
logging.level.org.springframework.security=INFO

# =========================
# SEGURIDAD JWT
# =========================
jwt.secret=RutaSmartSecretKey2026SeguridadJWTClaveMuyLargaParaFirmas
jwt.expiration=86400000

# Estadísticas
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG