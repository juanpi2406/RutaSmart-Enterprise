<div class="usuarios-container">

    <div class="page-header">
        <div>
            <h2>Configuración</h2>
            <p>Información del sistema y catálogos de referencia.</p>
        </div>
    </div>

    <div class="cards">
        <div class="card">
            <i class="bi bi-info-circle-fill"></i>
            <div>
                <span>Sistema</span>
                <h2>RutaSmart Enterprise V2</h2>
            </div>
        </div>
    </div>

    <div class="tabla-container" style="padding: 20px; margin-bottom: 20px;">
        <p style="margin: 0 0 10px 0;">Documentación de la API:</p>
        <a [href]="swaggerUrl" target="_blank" class="btn-primary" style="display: inline-block; text-decoration: none; margin-right: 10px;">
            Swagger UI
        </a>
        <a [href]="apiDocsUrl" target="_blank" class="btn-secondary" style="display: inline-block; text-decoration: none;">
            API Docs (JSON)
        </a>
    </div>

    <div class="tabla-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                </tr>
            </thead>
            <tbody>
                @for(rol of roles; track rol.idRol){
                <tr>
                    <td>{{ rol.idRol }}</td>
                    <td>{{ rol.nombre }}</td>
                </tr>
                }
            </tbody>
        </table>
    </div>

</div>
