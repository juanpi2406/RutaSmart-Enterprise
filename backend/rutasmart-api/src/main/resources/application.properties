spring.application.name=RutaSmart API

# Puerto dinámico para Railway
server.port=${PORT:8080}

# Configuración de Base de Datos (usando variables de entorno)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — evita conexiones stale con Supabase pgBouncer
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1
# pgBouncer transaction mode requiere desactivar prepared statements
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA / Hibernate
spring.jpa.open-in-view=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Configuración Horaria y Swagger
spring.jackson.time-zone=America/Lima
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger

# Logs y Seguridad
logging.level.org.springframework.security=INFO

# =========================
# SEGURIDAD JWT
# =========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Estadísticas
spring.jpa.properties.hibernate.generate_statistics=false
logging.level.org.hibernate.stat=WARN