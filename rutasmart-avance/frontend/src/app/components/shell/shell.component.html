<div class="layout">
  <aside class="sidebar">
    <div class="logo">
      <i class="bi bi-bus-front-fill"></i>
      <div>
        <h2>RutaSmart</h2>
        <span>Enterprise</span>
      </div>
    </div>

    <ul class="menu">
      <li *ngFor="let m of menu" routerLinkActive="active">
        <a [routerLink]="m.link">
          <i class="bi" [ngClass]="m.icon"></i>
          {{ m.label }}
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <img [src]="avatarUrl" alt="">
      <div>
        <strong>{{ user()?.name }}</strong>
        <small>{{ user()?.role }}</small>
      </div>
      <button class="logout-btn" (click)="logout()" title="Cerrar sesión">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="navbar">
      <div class="left">
        <button class="menu-btn"><i class="bi bi-list"></i></button>
        <h1>RutaSmart</h1>
      </div>

      <div class="right">
        <div class="search" (click)="$event.stopPropagation()">
          <i class="bi bi-search"></i>
          <input type="text" [(ngModel)]="searchTerm" (input)="onSearch()" placeholder="Buscar usuarios, reservas, rutas...">
          <div class="search-results" [class.active]="searchResults.length > 0">
            <div class="search-result-item" *ngFor="let r of searchResults" (click)="irA(r.url)">
              <div>
                <div>{{ r.titulo }}</div>
                <small>{{ r.sub }}</small>
              </div>
            </div>
          </div>
        </div>

        <div class="icon-wrap" (click)="$event.stopPropagation()">
          <button class="icon" (click)="toggle('noti')">
            <i class="bi bi-bell-fill"></i>
            <span class="badge" *ngIf="notiNoLeidas > 0">{{ notiNoLeidas }}</span>
          </button>
          <div class="dropdown" [class.active]="openDropdown === 'noti'">
            <div class="dropdown-header">
              <h4>Notificaciones</h4>
              <button type="button" (click)="marcarTodas()">Marcar leídas</button>
            </div>
            <div class="dropdown-body">
              <div class="drop-item" [class.unread]="!n.leido" *ngFor="let n of notis; let i = index" (click)="marcarLeida(i)">
                <i class="bi" [ngClass]="n.icon"></i>
                <div class="txt"><p>{{ n.texto }}</p><small>{{ n.tiempo }}</small></div>
              </div>
            </div>
          </div>
        </div>

        <div class="icon-wrap" (click)="$event.stopPropagation()">
          <button class="icon" (click)="toggle('msg')">
            <i class="bi bi-envelope-fill"></i>
            <span class="badge" *ngIf="mensajes.length > 0">{{ mensajes.length }}</span>
          </button>
          <div class="dropdown" [class.active]="openDropdown === 'msg'">
            <div class="dropdown-header">
              <h4>Mensajes</h4>
              <button type="button">Ver todos</button>
            </div>
            <div class="dropdown-body">
              <div class="drop-item" *ngFor="let m of mensajes">
                <i class="bi bi-person-circle"></i>
                <div class="txt"><p><strong>{{ m.de }}</strong></p><small>{{ m.texto }}</small><small>{{ m.tiempo }}</small></div>
              </div>
            </div>
          </div>
        </div>

        <div class="clock">
          <div>{{ hora }}</div>
          <small>{{ fecha }}</small>
        </div>

        <div class="icon-wrap profile-wrap" (click)="$event.stopPropagation()">
          <img [src]="avatarUrl" class="avatar" (click)="toggle('perfil')" alt="Perfil">
          <div class="dropdown profile-dropdown" [class.active]="openDropdown === 'perfil'">
            <div class="profile-card-dd">
              <img [src]="avatarUrl" alt="">
              <h4>{{ user()?.name }}</h4>
              <small>{{ user()?.role }}</small>
            </div>
            <div class="profile-menu">
              <label (click)="editarFoto()"><i class="bi bi-camera-fill"></i> Editar foto
                <input #fileInput type="file" accept="image/*" style="display:none" (change)="onFotoChange($event)">
              </label>
              <a routerLink="/app/configuracion"><i class="bi bi-gear-fill"></i> Configuración</a>
              <button type="button" (click)="logout()"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <router-outlet></router-outlet>
  </div>
</div>
